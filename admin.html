<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — ARGUN Printing</title>
<link rel="icon" type="image/png" href="images/ARGUN.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--p:#348aca;--g:linear-gradient(135deg,#348aca,#2ec5f4);--t:#0f172a;--m:#64748b;--bg:#f1f5f9;--w:#fff;--b:#e2e8f0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);}
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a,#1a3a5c);display:flex;align-items:center;justify-content:center;z-index:9999;}
#loginScreen.hide{display:none;}
.lbox{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:3rem 2.5rem;width:360px;text-align:center;}
.ltitle{font-size:1.7rem;font-weight:700;background:var(--g);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem;}
.lsub{color:rgba(255,255,255,.4);font-size:.82rem;margin-bottom:2rem;}
.lpw{width:100%;padding:.85rem 1rem;background:rgba(255,255,255,.09);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;font-size:1rem;font-family:inherit;outline:none;margin-bottom:1rem;text-align:center;letter-spacing:3px;}
.lpw::placeholder{letter-spacing:0;color:rgba(255,255,255,.25);}
.lpw:focus{border-color:var(--p);}
.lbtn{width:100%;padding:.9rem;background:var(--g);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;}
.lerr{color:#f87171;font-size:.83rem;margin-top:.6rem;display:none;}
.lerr.show{display:block;}
#app{display:none;min-height:100vh;}
#app.show{display:flex;}
.sb{width:220px;flex-shrink:0;background:#0f172a;display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;}
.sb-top{padding:1.5rem;border-bottom:1px solid rgba(255,255,255,.06);}
.sb-name{font-size:1.2rem;font-weight:700;background:var(--g);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.sb-sub{color:rgba(255,255,255,.3);font-size:.72rem;margin-top:2px;}
.sb-nav{flex:1;padding:.75rem 0;}
.sbl{display:flex;align-items:center;gap:10px;padding:.7rem 1.5rem;color:rgba(255,255,255,.45);font-size:.87rem;cursor:pointer;border-left:3px solid transparent;transition:all .2s;}
.sbl:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.04);}
.sbl.on{color:#2ec5f4;border-left-color:#2ec5f4;background:rgba(46,197,244,.06);}
.sbl i{width:15px;text-align:center;}
.sb-foot{padding:1rem 1.5rem;border-top:1px solid rgba(255,255,255,.06);}
.outbtn{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.3);font-size:.83rem;cursor:pointer;background:none;border:none;font-family:inherit;}
.outbtn:hover{color:#f87171;}
.main{margin-left:220px;flex:1;}
.topbar{background:var(--w);border-bottom:1px solid var(--b);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.topbar-t{font-size:1rem;font-weight:700;}
.topbar-r{display:flex;align-items:center;gap:.75rem;}
.dtext{font-size:.8rem;color:var(--m);}
.rbtn{display:flex;align-items:center;gap:6px;padding:.45rem .9rem;background:var(--g);color:#fff;border:none;border-radius:7px;font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;padding:1.5rem 2rem 0;}
.stat{background:var(--w);border-radius:12px;padding:1.1rem 1.4rem;display:flex;align-items:center;gap:1rem;border:1px solid var(--b);}
.si{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.9rem;flex-shrink:0;}
.sn{font-size:1.5rem;font-weight:700;line-height:1;}
.sl{font-size:.72rem;color:var(--m);margin-top:2px;}
.toolbar{display:flex;align-items:center;gap:.75rem;padding:1.25rem 2rem .75rem;flex-wrap:wrap;}
.sbox{display:flex;align-items:center;gap:7px;background:var(--w);border:1.5px solid var(--b);border-radius:8px;padding:.55rem .9rem;flex:1;min-width:180px;}
.sbox i{color:var(--m);font-size:.8rem;}
.sbox input{border:none;outline:none;font-family:inherit;font-size:.87rem;background:transparent;width:100%;color:var(--t);}
.fsel{padding:.55rem .9rem;border:1.5px solid var(--b);border-radius:8px;font-family:inherit;font-size:.87rem;color:var(--t);background:var(--w);cursor:pointer;outline:none;}
.tbtn{display:flex;align-items:center;gap:5px;padding:.55rem 1rem;background:var(--g);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;}
.twrap{padding:0 2rem 2rem;overflow-x:auto;}
table{width:100%;background:var(--w);border-radius:12px;border-collapse:separate;border-spacing:0;border:1px solid var(--b);overflow:hidden;}
th{background:#f8fafc;padding:.65rem 1rem;text-align:left;font-size:.72rem;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--b);white-space:nowrap;}
td{padding:.85rem 1rem;font-size:.84rem;border-bottom:1px solid var(--b);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f8fafc;}
.badge{display:inline-flex;padding:2px 9px;border-radius:50px;font-size:.72rem;font-weight:600;}
.bn{background:rgba(59,130,246,.1);color:#3b82f6;}
.br{background:rgba(245,158,11,.1);color:#f59e0b;}
.bd{background:rgba(16,185,129,.1);color:#10b981;}
.bc{background:rgba(239,68,68,.1);color:#ef4444;}
.ab{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:.75rem;transition:all .2s;}
.av{background:rgba(52,138,202,.1);color:var(--p);}
.av:hover{background:var(--p);color:#fff;}
.ad{background:rgba(239,68,68,.1);color:#ef4444;}
.ad:hover{background:#ef4444;color:#fff;}
.empty{text-align:center;padding:3.5rem 2rem;color:var(--m);}
.empty i{font-size:2.5rem;opacity:.25;margin-bottom:.75rem;display:block;}
.ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(5px);z-index:1000;align-items:center;justify-content:center;padding:1rem;}
.ov.show{display:flex;}
.modal{background:var(--w);border-radius:18px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.18);animation:up .25s ease;}
@keyframes up{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:1.3rem 1.7rem;border-bottom:1px solid var(--b);position:sticky;top:0;background:var(--w);}
.mh h3{font-size:1rem;font-weight:700;}
.xb{width:30px;height:30px;border-radius:7px;border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;color:var(--m);}
.xb:hover{background:#ef4444;color:#fff;}
.mb{padding:1.5rem 1.7rem;}
.ms{margin-bottom:1.3rem;}
.mst{font-size:.68rem;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:1px;margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px solid rgba(52,138,202,.12);}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
.mf{display:flex;flex-direction:column;gap:2px;}
.mfl{font-size:.72rem;color:var(--m);}
.mfv{font-size:.85rem;font-weight:500;}
.mfv.na{color:#cbd5e1;font-style:italic;}
.et{display:inline-block;padding:2px 9px;border-radius:50px;background:rgba(52,138,202,.08);color:var(--p);font-size:.74rem;font-weight:600;margin:2px;}
.sbr{display:flex;gap:8px;flex-wrap:wrap;padding-top:1.1rem;margin-top:1.1rem;border-top:1px solid var(--b);}
.sb2{padding:.45rem 1rem;border-radius:7px;border:none;cursor:pointer;font-weight:600;font-size:.8rem;font-family:inherit;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#0f172a;color:#fff;padding:.65rem 1.2rem;border-radius:9px;font-size:.85rem;font-weight:500;box-shadow:0 6px 20px rgba(0,0,0,.25);transform:translateY(80px);opacity:0;transition:all .3s;z-index:9999;}
.toast.show{transform:translateY(0);opacity:1;}
@media(max-width:700px){.sb,.main{margin-left:0;}.sb{display:none;}.stats{grid-template-columns:1fr 1fr;}.mg{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="lbox">
    <div class="ltitle">ARGUN Printing</div>
    <div class="lsub">Admin Dashboard</div>
    <input class="lpw" id="pw" type="password" placeholder="Нууц үг">
    <button class="lbtn" onclick="login()"><i class="fas fa-unlock" style="margin-right:7px"></i>Нэвтрэх</button>
    <div class="lerr" id="lerr">Нууц үг буруу байна</div>
  </div>
</div>

<div id="app">
  <aside class="sb">
    <div class="sb-top"><div class="sb-name">ARGUN</div><div class="sb-sub">Admin Dashboard</div></div>
    <nav class="sb-nav">
      <div class="sbl on"><i class="fas fa-inbox"></i> Захиалгууд</div>
      <div class="sbl" onclick="open('index.html','_blank')"><i class="fas fa-globe"></i> Вэбсайт</div>
      <div class="sbl" onclick="open('quote.html','_blank')"><i class="fas fa-file-invoice"></i> Маягт</div>
    </nav>
    <div class="sb-foot"><button class="outbtn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Гарах</button></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-t"><i class="fas fa-inbox" style="color:var(--p);margin-right:8px"></i>Үнийн санал — Захиалгууд</div>
      <div class="topbar-r">
        <span class="dtext" id="dtxt"></span>
        <button class="rbtn" onclick="loadData()"><i class="fas fa-sync-alt"></i> Шинэчлэх</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="si" style="background:linear-gradient(135deg,#3b82f6,#60a5fa)"><i class="fas fa-inbox"></i></div><div><div class="sn" id="s0">0</div><div class="sl">Нийт</div></div></div>
      <div class="stat"><div class="si" style="background:linear-gradient(135deg,#6366f1,#818cf8)"><i class="fas fa-star"></i></div><div><div class="sn" id="s1">0</div><div class="sl">Шинэ</div></div></div>
      <div class="stat"><div class="si" style="background:linear-gradient(135deg,#f59e0b,#fbbf24)"><i class="fas fa-clock"></i></div><div><div class="sn" id="s2">0</div><div class="sl">Хянаж байгаа</div></div></div>
      <div class="stat"><div class="si" style="background:linear-gradient(135deg,#10b981,#34d399)"><i class="fas fa-check-circle"></i></div><div><div class="sn" id="s3">0</div><div class="sl">Зөвшөөрсөн</div></div></div>
    </div>

    <div class="toolbar">
      <div class="sbox"><i class="fas fa-search"></i><input type="text" id="q" placeholder="Нэр, и-мэйл, бүтээгдэхүүнээр хайх..." oninput="render()"></div>
      <select class="fsel" id="sf" onchange="render()">
        <option value="">Бүх статус</option>
        <option>Шинэ</option><option>Хянаж байгаа</option><option>Зөвшөөрсөн</option><option>Цуцлагдсан</option>
      </select>
      <button class="tbtn" onclick="doCSV()"><i class="fas fa-download"></i> CSV</button>
    </div>

    <div class="twrap">
      <table>
        <thead><tr><th>#</th><th>Огноо</th><th>Нэр</th><th>И-мэйл</th><th>Утас</th><th>Бүтээгдэхүүн</th><th>Тоо</th><th>Статус</th><th></th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="emp" style="display:none"><i class="fas fa-inbox"></i><p>Захиалга байхгүй байна</p></div>
    </div>
  </div>
</div>

<div class="ov" id="ov" onclick="if(event.target===this)cm()">
  <div class="modal">
    <div class="mh"><h3 id="mt"></h3><button class="xb" onclick="cm()"><i class="fas fa-times"></i></button></div>
    <div class="mb" id="mb"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var PASS='ARGUN2025@';
var URL='https://script.google.com/macros/s/AKfycbxpfs2kTe9Io_FFZ4Ea4yOLJ4TJ35lNG0T_1ZoNFdmGoAjCZeJzYN9N2zDsGWGdytoO5Q/exec';
var rows=[];

function login(){
  if(document.getElementById('pw').value===PASS){
    sessionStorage.setItem('a','1');
    go();
  } else {
    document.getElementById('lerr').classList.add('show');
    document.getElementById('pw').value='';
  }
}
function logout(){sessionStorage.removeItem('a');location.reload();}
function go(){
  document.getElementById('loginScreen').classList.add('hide');
  document.getElementById('app').classList.add('show');
  document.getElementById('dtxt').textContent=new Date().toLocaleDateString('mn-MN',{year:'numeric',month:'long',day:'numeric'});
  loadData();
}
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')login();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')cm();});
if(sessionStorage.getItem('a')==='1') go();

function loadData(){
  document.getElementById('tbody').innerHTML='<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--m)"><i class="fas fa-spinner fa-spin" style="margin-right:8px"></i>Уншиж байна...</td></tr>';
  fetch(URL+'?_='+Date.now())
    .then(function(r){return r.json();})
    .then(function(data){
      rows=Array.isArray(data)?data:[];
      rows.reverse();
      render();
      updStats();
      toast('✓ '+rows.length+' захиалга');
    })
    .catch(function(){
      // fetch failed, try JSONP
      var old=document.getElementById('_js');
      if(old)old.remove();
      window._cb=function(data){
        rows=Array.isArray(data)?data:[];
        rows.reverse();
        render();
        updStats();
        toast('✓ '+rows.length+' захиалга');
      };
      var s=document.createElement('script');
      s.id='_js';
      s.src=URL+'?callback=_cb&_='+Date.now();
      s.onerror=function(){
        document.getElementById('tbody').innerHTML='<tr><td colspan="9" style="text-align:center;padding:2rem;color:#ef4444"><i class="fas fa-exclamation-circle" style="margin-right:8px"></i>Алдаа гарлаа. Apps Script шинэчлэгдсэн эсэхийг шалгана уу.</td></tr>';
      };
      document.body.appendChild(s);
    });
}

function updStats(){
  document.getElementById('s0').textContent=rows.length;
  document.getElementById('s1').textContent=rows.filter(function(d){return(d['Статус']||'Шинэ')==='Шинэ';}).length;
  document.getElementById('s2').textContent=rows.filter(function(d){return d['Статус']==='Хянаж байгаа';}).length;
  document.getElementById('s3').textContent=rows.filter(function(d){return d['Статус']==='Зөвшөөрсөн';}).length;
}

function render(){
  var q=(document.getElementById('q').value||'').toLowerCase();
  var sf=document.getElementById('sf').value;
  var f=rows.filter(function(d){
    var t=[d['Нэр'],d['first_name'],d['И-мэйл'],d['email'],d['Бүтээгдэхүүн'],d['product_type'],d['Утас'],d['phone']].join(' ').toLowerCase();
    return(!q||t.includes(q))&&(!sf||(d['Статус']||'Шинэ')===sf);
  });
  var tb=document.getElementById('tbody'),em=document.getElementById('emp');
  if(!f.length){tb.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  var bc={'Шинэ':'bn','Хянаж байгаа':'br','Зөвшөөрсөн':'bd','Цуцлагдсан':'bc'};
  tb.innerHTML=f.map(function(d){
    var st=d['Статус']||'Шинэ';
    var ri=rows.indexOf(d);
    var nm=d['Нэр']||d['first_name']||'—';
    var em2=d['И-мэйл']||d['email']||'—';
    var ph=d['Утас']||d['phone']||'—';
    var pr=d['Бүтээгдэхүүн']||d['product_type']||'—';
    var sz=d['Хэмжээ']||d['size']||'';
    var qt=d['Тоо ширхэг']||d['quantity']||'—';
    var dt=d['Огноо']||'—';
    return '<tr>'+
      '<td style="color:var(--m);font-size:.75rem">#'+(ri+1)+'</td>'+
      '<td style="color:var(--m);font-size:.78rem;white-space:nowrap">'+dt+'</td>'+
      '<td><strong>'+nm+'</strong></td>'+
      '<td><a href="mailto:'+em2+'" style="color:var(--p);text-decoration:none;font-size:.82rem">'+em2+'</a></td>'+
      '<td>'+ph+'</td>'+
      '<td>'+pr+(sz?'<br><span style="font-size:.72rem;color:var(--m)">'+sz+'</span>':'')+'</td>'+
      '<td>'+qt+'</td>'+
      '<td><span class="badge '+(bc[st]||'bn')+'">'+st+'</span></td>'+
      '<td style="display:flex;gap:5px">'+
        '<button class="ab av" onclick="det('+ri+')" title="Харах"><i class="fas fa-eye"></i></button>'+
        '<button class="ab ad" onclick="del('+ri+')" title="Устгах"><i class="fas fa-trash"></i></button>'+
      '</td></tr>';
  }).join('');
}

function det(i){
  var d=rows[i];if(!d)return;
  var nm=d['Нэр']||d['first_name']||'—';
  var pr=d['Бүтээгдэхүүн']||d['product_type']||'Захиалга';
  var st=d['Статус']||'Шинэ';
  var rn=d['_row'];
  var ex=(d['Нэмэлт ажилбар']||d['extra_services']||'').split(',').filter(Boolean);
  document.getElementById('mt').textContent=nm+' — '+pr;
  document.getElementById('mb').innerHTML=
    sec('Захиалагч',[fld('Нэр',nm),fld('И-мэйл','<a href="mailto:'+(d['И-мэйл']||d['email']||'')+'" style="color:var(--p)">'+(d['И-мэйл']||d['email']||'—')+'</a>'),fld('Утас',d['Утас']||d['phone']),fld('Байгууллага',d['Байгууллага']||d['org_name']||'Хувь хүн'),fld('Огноо',d['Огноо'])])+
    sec('Бүтээгдэхүүн',[fld('Төрөл',d['Бүтээгдэхүүн']||d['product_type']),fld('Хэмжээ',d['Хэмжээ']||d['size']),fld('Нүүрний тоо',d['Нүүрний тоо']||d['page_count']),fld('Тоо ширхэг',d['Тоо ширхэг']||d['quantity']),fld('Өнгө',d['Өнгө']||d['color'])])+
    sec('Цаас & Хавтас',[fld('Хавтас',d['Хавтас']||d['cover_type']),fld('Хавтас гр',d['Хавтасны гр']||d['cover_gsm']),fld('Дотор цаас',d['Дотор цаас']||d['inner_paper']),fld('Дотор гр',d['Дотор гр']||d['inner_gsm'])])+
    (ex.length?'<div class="ms"><div class="mst">Нэмэлт ажилбар</div>'+ex.map(function(e){return'<span class="et">'+e.trim()+'</span>';}).join('')+'</div>':'')+
    ((d['Тайлбар']||d['notes'])?'<div class="ms"><div class="mst">Тайлбар</div><p style="font-size:.84rem;line-height:1.7;background:var(--bg);padding:.9rem;border-radius:8px">'+(d['Тайлбар']||d['notes'])+'</p></div>':'')+
    ((d['Файл линк']||d['file_link'])?'<div class="ms"><div class="mst">Файл линк</div><a href="'+(d['Файл линк']||d['file_link'])+'" target="_blank" style="color:var(--p);font-size:.84rem;word-break:break-all">'+(d['Файл линк']||d['file_link'])+'</a></div>':'')+
    '<div class="sbr">'+
      sb2(rn,'Хянаж байгаа',st,'⏳','#f59e0b')+
      sb2(rn,'Зөвшөөрсөн',st,'✅','#10b981')+
      sb2(rn,'Цуцлагдсан',st,'❌','#ef4444')+
    '</div>';
  document.getElementById('ov').classList.add('show');
}

function sec(t,fields){return'<div class="ms"><div class="mst">'+t+'</div><div class="mg">'+fields.join('')+'</div></div>';}
function fld(l,v){var na=(!v||v==='—')?' na':'';return'<div class="mf"><span class="mfl">'+l+'</span><span class="mfv'+na+'">'+(v||'—')+'</span></div>';}
function sb2(rn,st,cur,ic,col){var on=cur===st;return'<button class="sb2" onclick="setSt('+rn+',\''+st+'\')" style="background:'+(on?col:'rgba(0,0,0,.06)')+';color:'+(on?'#fff':col)+'">'+ic+' '+st+'</button>';}

window._noop=function(){};
function setSt(rn,st){
  var s=document.createElement('script');
  s.src=URL+'?action=updateStatus&row='+rn+'&status='+encodeURIComponent(st)+'&callback=_noop&_='+Date.now();
  document.body.appendChild(s);
  toast('Статус: '+st+' ✓');
  cm();
  setTimeout(loadData,1500);
}

function del(i){
  var d=rows[i];if(!d)return;
  if(!confirm((d['Нэр']||d['first_name']||'Захиалга')+' устгах уу?'))return;
  var s=document.createElement('script');
  s.src=URL+'?action=deleteRow&row='+d['_row']+'&callback=_noop&_='+Date.now();
  document.body.appendChild(s);
  toast('Устгагдлаа ✓');
  setTimeout(loadData,1500);
}

function cm(){document.getElementById('ov').classList.remove('show');}

function doCSV(){
  if(!rows.length){toast('Өгөгдөл байхгүй');return;}
  var cols=Object.keys(rows[0]).filter(function(k){return k!=='_row';});
  var csv=[cols.join(',')].concat(rows.map(function(d){return cols.map(function(c){return'"'+String(d[c]||'').replace(/"/g,'""')+'"';}).join(',');})).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='argun-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV татагдлаа ✓');
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}
</script>
